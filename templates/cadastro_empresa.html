<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa - TalentMatch!</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Cabeçalho -->
    <header class="bg-white shadow-sm">
        <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <h1 class="text-2xl font-bold text-indigo-600">TalentMatch!</h1>

                <a href="{% url 'login' %}"
                   class="bg-indigo-600 text-white font-semibold py-2 px-5 rounded-full hover:bg-indigo-700">
                    Entrar
                </a>
            </div>
        </nav>
    </header>

    <!-- Conteúdo -->
    <main class="py-12">
        <div class="max-w-3xl mx-auto bg-white p-8 md:p-12 rounded-lg shadow-lg">

            <h2 class="text-3xl font-bold text-center text-gray-900">Cadastro de Empresa</h2>
            <p class="text-center text-gray-500 mt-2">Conecte-se a talentos qualificados.</p>

            <!-- Abas -->
            <div class="mt-8 border-b border-gray-200">
                <nav class="-mb-px flex justify-center gap-8">

                    <a href="{% url 'cadastro_candidato' %}"
                       class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 py-4 px-1 text-sm">
                        Sou Candidato
                    </a>

                    <a href="{% url 'cadastro_empresa' %}"
                       class="border-b-2 border-indigo-600 text-indigo-600 py-4 px-1 text-sm font-medium">
                        Sou Empresa
                    </a>

                </nav>
            </div>

            <!-- Formulário -->
            <form action="" method="POST" enctype="multipart/form-data" class="mt-8 space-y-8">
                {% csrf_token %}

                <!-- Dados da Empresa -->
                <fieldset>
                    <legend class="text-xl font-semibold text-gray-800 mb-6">Informações da Empresa</legend>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Nome da Empresa</label>
                            <input type="text" name="nome" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">CNPJ</label>
                            <input type="text" name="cnpj" placeholder="00.000.000/0000-00"
                                   class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Telefone</label>
                            <input type="tel" name="telefone" placeholder="(00) 00000-0000"
                                   class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" name="email"
                                   class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Área de Atuação</label>
                            <input type="text" name="area"
                                   placeholder="Tecnologia, Varejo, Educação..."
                                   class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Descrição da Empresa</label>
                            <textarea name="descricao" rows="4"
                                      class="block w-full rounded-md border-gray-300 shadow-sm mt-1"></textarea>
                        </div>

                    </div>
                </fieldset>

                <!-- Acesso -->
                <fieldset>
                    <legend class="text-xl font-semibold text-gray-800 mb-6">Acesso</legend>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Senha</label>
                            <input type="password" name="senha"
                                   class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Confirmar Senha</label>
                            <input type="password" name="confirmar_senha"
                                   class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>
                    </div>
                </fieldset>

                <!-- Botão -->
                <button type="submit"
                    class="w-full py-3 px-4 rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700">
                    Criar Conta de Empresa
                </button>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    Já tem uma conta?
                    <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">
                        Faça login
                    </a>
                </p>
            </div>

        </div>
    </main>

</body>
</html>
