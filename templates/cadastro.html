{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Conta - TalentMatch!</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Cabeçalho Superior -->
    <header class="bg-white shadow-sm">
        <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <h1 class="text-2xl font-bold text-indigo-600">TalentMatch!</h1>
                </div>
                <div>
                    <a href="{% url 'login' %}" 
                       class="bg-indigo-600 text-white font-semibold py-2 px-5 rounded-full hover:bg-indigo-700 transition-colors">
                        Entrar
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Conteúdo Principal: Formulário -->
    <main class="py-12">
        <div class="max-w-3xl mx-auto bg-white p-8 md:p-12 rounded-lg shadow-lg">
            
            <h2 class="text-3xl font-bold text-center text-gray-900">Crie sua Conta</h2>
            <p class="text-center text-gray-500 mt-2">Preencha seus dados para encontrar as melhores vagas.</p>

            <!-- Abas -->
            <div class="mt-8">
                <div class="border-b border-gray-200">
                    <nav class="-mb-px flex justify-center gap-8" aria-label="Tabs">
                        <a href="{% url 'cadastro_candidato' %}"
                           class="border-b-2 border-indigo-600 text-indigo-600 py-4 px-1 text-sm font-medium">
                            Sou Candidato
                        </a>

                        <a href="{% url 'cadastro_empresa' %}"
                           class="border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 py-4 px-1 text-sm font-medium">
                            Sou Empresa
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Formulário -->
            <form action="" method="POST" enctype="multipart/form-data" class="mt-8 space-y-8">
                {% csrf_token %}

                <!-- Dados Pessoais -->
                <fieldset>
                    <legend class="text-xl font-semibold text-gray-800 mb-6">Dados Pessoais</legend>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                            <input type="text" name="nome" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Data de Nascimento</label>
                            <input type="text" name="nascimento" placeholder="mm/dd/yyyy" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Sexo</label>
                            <select name="sexo" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                                <option>Masculino</option>
                                <option>Feminino</option>
                                <option>Outro</option>
                                <option>Prefiro não informar</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Pronomes</label>
                            <input type="text" name="pronomes" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Telefone</label>
                            <input type="tel" name="telefone" placeholder="(00) 00000-0000" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Cidade</label>
                            <input type="text" name="cidade" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Estado</label>
                            <input type="text" name="estado" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>

                        <div class="md:col-span-2 flex items-center mt-2">
                            <input id="pcd" name="pcd" type="checkbox" class="h-4 w-4 text-indigo-600">
                            <label for="pcd" class="ml-2 text-sm text-gray-900">Sou Pessoa com Deficiência (PCD)</label>
                        </div>
                    </div>
                </fieldset>

                <!-- Acesso -->
                <fieldset>
                    <legend class="text-xl font-semibold text-gray-800 mb-6">Acesso</legend>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Email</label>
                            <input type="email" name="email" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Senha</label>
                            <input type="password" name="senha" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>
                    </div>
                </fieldset>

                <!-- Informações Profissionais -->
                <fieldset>
                    <legend class="text-xl font-semibold text-gray-800 mb-6">Informações Profissionais</legend>
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Área de Atuação</label>
                            <input type="text" name="area" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Habilidades</label>
                            <input type="text" name="habilidades" class="block w-full rounded-md border-gray-300 shadow-sm mt-1">
                        </div>
                    </div>
                </fieldset>

                <!-- Botão -->
                <div>
                    <button type="submit"
                        class="w-full py-3 px-4 rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
                        Criar Conta de Candidato
                    </button>
                </div>
            </form>

            <div class="text-center mt-6">
                <p class="text-sm text-gray-600">
                    Já tem uma conta?
                    <a href="{% url 'login' %}" class="font-medium text-indigo-600 hover:text-indigo-500">
                        Faça login
                    </a>
                </p>
            </div>

        </div>
    </main>

</body>
</html>
